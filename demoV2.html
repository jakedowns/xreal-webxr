<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XREAL Air IMU Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e6edf3; }

#scene-container { position: fixed; inset: 0; z-index: 0; }

#top-bar {
  position: fixed; top: 12px; right: 12px; z-index: 10;
  display: flex; align-items: center; gap: 8px;
}
#top-bar button, #top-bar .status-dot {
  font-size: 12px; padding: 6px 12px; border-radius: 6px;
  border: 1px solid #30363d; background: #161b22; color: #e6edf3;
  cursor: pointer; white-space: nowrap;
}
#top-bar button:hover { background: #21262d; }
#top-bar button:active { background: #30363d; }
#top-bar button:disabled { opacity: 0.4; cursor: not-allowed; }
#connect-btn { background: #1a6bc4; border-color: #2188ff; color: #fff; font-weight: 600; }
#connect-btn:hover { background: #2188ff; }
#connect-btn:active { background: #005cc5; }
#connect-btn:disabled { background: #1a6bc4; opacity: 0.4; }
#status-text { font-size: 12px; color: #8b949e; padding: 6px 0; }
.status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
.status-dot.disconnected { background: #f85149; }
.status-dot.connected { background: #3fb950; }
.status-dot.connecting { background: #d29922; }

#graph-overlay {
  position: fixed; bottom: 12px; right: 12px; z-index: 10;
  border: 1px solid #30363d; border-radius: 8px; background: #161b22; overflow: hidden;
  width: 320px;
}
#graph-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; font-size: 11px; font-weight: 600; color: #8b949e;
  cursor: pointer; user-select: none;
}
#graph-header:hover { background: #1c2333; }
#graph-toggle { font-size: 10px; color: #484f58; background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; color: #8b949e; }
#graph-toggle:hover { background: #21262d; }
#graph-body { padding: 4px; }
#gyro-canvas { display: block; width: 100%; height: 100px; background: #0d1117; border-radius: 4px; }
.graph-legend { display: flex; gap: 12px; font-size: 10px; padding: 3px 6px 4px; }
.graph-legend .legend-item { display: flex; align-items: center; gap: 3px; }
.graph-legend .legend-dot { width: 7px; height: 7px; border-radius: 50%; }
.graph-values { margin-left: auto; font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; font-size: 10px; color: #484f58; }

#recenter-btn { margin-left: 4px; }
#recenter-btn svg { display: block; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="scene-container"></div>

<div id="top-bar">
  <span id="status-text"><span class="status-dot disconnected" id="status-dot"></span>Disconnected</span>
  <button id="recenter-btn" disabled title="Reset head orientation to center">&olarr;</button>
  <button id="calibrate-btn" disabled title="Calibrate IMU gyro drift (keep still for 2s)">Calibrate</button>
  <button id="sbs-btn" style="display:none">Mono</button>
  <button id="crossview-btn" style="display:none">Crossview</button>
  <button id="connect-btn">Connect</button>
</div>

<div id="graph-overlay">
  <div id="graph-header">
    <span>Gyroscope &deg;/s</span>
    <button id="graph-toggle">Hide</button>
  </div>
  <div id="graph-body">
    <canvas id="gyro-canvas"></canvas>
    <div class="graph-legend">
      <span class="legend-item"><span class="legend-dot" style="background:#ff6b6b"></span>X</span>
      <span class="legend-item"><span class="legend-dot" style="background:#51cf66"></span>Y</span>
      <span class="legend-item"><span class="legend-dot" style="background:#339af0"></span>Z</span>
      <span class="graph-values" id="gyro-values"></span>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'three';

function initScene() {
  const container = document.getElementById('scene-container');
  if (!container) return;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x0d1117);

  const IPD = 0.06;
  const camPos = { x: 0, y: 0.2, z: 2.2 };
  const camTarget = new THREE.Vector3(0, 0, 0);

  const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 10);
  camera.position.copy(camTarget).add(new THREE.Vector3(0, camPos.y, camPos.z));
  camera.lookAt(camTarget);

  const cameraL = new THREE.PerspectiveCamera(40, (container.clientWidth / 2) / container.clientHeight, 0.1, 10);
  cameraL.position.copy(camTarget).add(new THREE.Vector3(-IPD / 2, camPos.y, camPos.z));
  cameraL.lookAt(camTarget);

  const cameraR = new THREE.PerspectiveCamera(40, (container.clientWidth / 2) / container.clientHeight, 0.1, 10);
  cameraR.position.copy(camTarget).add(new THREE.Vector3(IPD / 2, camPos.y, camPos.z));
  cameraR.lookAt(camTarget);

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  container.appendChild(renderer.domElement);

  scene.add(new THREE.AmbientLight(0x404070, 0.4));
  const key = new THREE.DirectionalLight(0xffffff, 2);
  key.position.set(1.5, 2, 1.5);
  key.castShadow = true;
  scene.add(key);
  const fill = new THREE.DirectionalLight(0x8888ff, 0.6);
  fill.position.set(-1, 0.5, -1.5);
  scene.add(fill);
  const rim = new THREE.DirectionalLight(0x4488ff, 0.5);
  rim.position.set(0, -1, -1);
  scene.add(rim);

  const g = new THREE.Group();
  scene.add(g);
  const hg = new THREE.Group();
  g.add(hg);

  const headMat = new THREE.MeshStandardMaterial({ color: 0x8B7D6B, roughness: 0.6, metalness: 0.05 });
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.58, 32, 32), headMat);
  head.scale.set(1, 0.92, 0.85);
  hg.add(head);

  const skinMat = new THREE.MeshStandardMaterial({ color: 0xC4A882, roughness: 0.55, metalness: 0 });
  const face = new THREE.Mesh(new THREE.SphereGeometry(0.56, 32, 32), skinMat);
  face.scale.set(0.95, 0.88, 0.82);
  face.position.z = 0.02;
  hg.add(face);

  const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, roughness: 0.3, depthWrite: false });
  const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 0.1 });
  const irisMat = new THREE.MeshStandardMaterial({ color: 0x4a3728, roughness: 0.3 });
  const eyeData = [];
  function addEye(x) {
    const w = new THREE.Mesh(new THREE.SphereGeometry(0.1, 20, 20), whiteMat);
    w.position.set(x, 0.12, 0.54);
    hg.add(w);
    const iris = new THREE.Mesh(new THREE.SphereGeometry(0.065, 20, 20), irisMat);
    iris.position.set(x, 0.13, 0.57);
    hg.add(iris);
    iris.renderOrder = 2;
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.05, 16, 16), pupilMat);
    p.position.set(x, 0.13, 0.60);
    p.renderOrder = 3;
    hg.add(p);
    eyeData.push({ baseX: x, iris, pupil: p });
  }
  addEye(-0.16);
  addEye(0.16);

  const browMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.8 });
  for (const x of [-0.2, 0.2]) {
    const brow = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.02, 0.02), browMat);
    brow.position.set(x, 0.26, 0.52);
    brow.rotation.z = x < 0 ? 0.05 : -0.05;
    hg.add(brow);
  }

  const lidGeo = new THREE.SphereGeometry(0.13, 24, 24, 0, Math.PI * 2, 0, Math.PI * 0.35);
  const lidMat = new THREE.MeshStandardMaterial({ color: 0xC4A882, roughness: 0.7, side: THREE.DoubleSide });
  const LID_BASE_Y = 0.19;
  const eyelids = [];
  for (const x of [-0.16, 0.16]) {
    const lid = new THREE.Mesh(lidGeo, lidMat);
    lid.position.set(x, LID_BASE_Y, 0.54);
    hg.add(lid);
    eyelids.push({ mesh: lid, baseY: LID_BASE_Y });
  }

  const noseMat = new THREE.MeshStandardMaterial({ color: 0xC4A882, roughness: 0.7 });
  const nose = new THREE.Mesh(new THREE.ConeGeometry(0.055, 0.09, 8), noseMat);
  nose.position.set(0, 0, 0.58);
  nose.rotation.x = 0.2;
  hg.add(nose);
  const noseTip = new THREE.Mesh(new THREE.SphereGeometry(0.025, 8, 8), noseMat);
  noseTip.position.set(0, -0.02, 0.62);
  hg.add(noseTip);

  // ── Mouth ──
  const mouthMat = new THREE.MeshStandardMaterial({ color: 0xCC5555, roughness: 0.5 });
  const mouthRestGeo = new THREE.TorusGeometry(0.08, 0.012, 8, 16, Math.PI);
  const mouth = new THREE.Mesh(mouthRestGeo, mouthMat);
  mouth.position.set(0, -0.15, 0.54);
  mouth.rotation.x = Math.PI * 0.15;
  hg.add(mouth);

  const mouthBlowMat = new THREE.MeshStandardMaterial({ color: 0xCC4444, roughness: 0.4 });
  const mouthBlowGeo = new THREE.TorusGeometry(0.09, 0.02, 10, 20, Math.PI * 2);
  const mouthBlow = new THREE.Mesh(mouthBlowGeo, mouthBlowMat);
  mouthBlow.position.set(0, -0.15, 0.58);
  mouthBlow.visible = false;
  hg.add(mouthBlow);

  let smiling = false;
  function setSmile(smile) {
    if (smile === smiling) return;
    smiling = smile;
    mouth.scale.y = smile ? -1 : 1;
  }

  // ── Butterfly ──
  const bfPos = { x: 0.5, y: 0.3, z: 0.7 };
  const bfTarget = { x: 0.5, y: 0.3, z: 0.7 };
  let bfPhase2 = Math.random() * Math.PI * 2;
  const bfGroup = new THREE.Group();
  bfGroup.position.set(bfPos.x, bfPos.y, bfPos.z);
  const bfBody = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, 0.03, 6), new THREE.MeshStandardMaterial({ color: 0x222222 }));
  bfBody.rotation.x = Math.PI / 2;
  bfGroup.add(bfBody);
  const wingShape = new THREE.Shape();
  wingShape.moveTo(0, 0);
  wingShape.quadraticCurveTo(0.05, 0.03, 0.08, 0);
  wingShape.quadraticCurveTo(0.05, -0.03, 0, 0);
  const wingGeo = new THREE.ShapeGeometry(wingShape);
  const wingMat = new THREE.MeshStandardMaterial({ color: 0xFFA500, emissive: 0x884400, emissiveIntensity: 0.4, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });
  const bfWings = [];
  for (const sx of [-1, 1]) {
    const wing = new THREE.Mesh(wingGeo, wingMat);
    wing.position.x = sx * 0.01;
    wing.scale.x = sx;
    wing.rotation.x = -Math.PI / 2;
    wing.rotation.y = 0.3;
    bfGroup.add(wing);
    bfWings.push(wing);
  }
  scene.add(bfGroup);

  // ── Butterfly trail ──
  const TRAIL_LEN = 50;
  const TRAIL_INTERVAL = 0.02;
  const trailData = [];
  let trailTimer = 0;
  const trailMat2 = new THREE.PointsMaterial({
    color: 0xFF8800, size: 0.015, transparent: true, opacity: 0.5,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const trailGeo2 = new THREE.BufferGeometry();
  const trailPos2 = new Float32Array(TRAIL_LEN * 3);
  trailGeo2.setAttribute('position', new THREE.BufferAttribute(trailPos2, 3));
  trailGeo2.setDrawRange(0, 0);
  const trailPts2 = new THREE.Points(trailGeo2, trailMat2);
  trailPts2.renderOrder = -1;
  scene.add(trailPts2);

  // ── Sneeze ──
  let sneezeTimer = 0;
  const SNEEZE_DURATION = 0.4;
  let isSneezing = false;
  let prevPopColor = 0xff69b4;
  let blinkTimer = 3 + Math.random() * 3;

  // Glasses
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3, metalness: 0.7 });
  for (const x of [-0.2, 0.2]) {
    const ring = new THREE.Mesh(new THREE.TorusGeometry(0.18, 0.025, 12, 24), frameMat);
    ring.position.set(x, 0.1, 0.5);
    ring.rotation.z = 0.02;
    hg.add(ring);
    const lensMat = new THREE.MeshStandardMaterial({ color: 0x224466, roughness: 0.1, metalness: 0, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
    const lens = new THREE.Mesh(new THREE.CircleGeometry(0.16, 20), lensMat);
    lens.position.set(x, 0.1, 0.51);
    hg.add(lens);
  }
  const bridge = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.025, 0.025), frameMat);
  bridge.position.set(0, 0.1, 0.5);
  hg.add(bridge);
  for (const x of [-0.38, 0.38]) {
    const arm = new THREE.Mesh(new THREE.BoxGeometry(0.35, 0.02, 0.02), frameMat);
    arm.position.set(x * 1.5, 0.1, 0.2);
    arm.rotation.y = -Math.sign(x) * Math.PI / 2;
    hg.add(arm);
  }

  const neckMat = new THREE.MeshStandardMaterial({ color: 0xC4A882, roughness: 0.8 });
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.28, 0.25, 12), neckMat);
  neck.position.set(0, -0.55, 0);
  g.add(neck);

  const shadowMat = new THREE.MeshStandardMaterial({ color: 0x000000, transparent: true, opacity: 0.15, roughness: 1, metalness: 0 });
  const shadow = new THREE.Mesh(new THREE.CircleGeometry(0.6, 20), shadowMat);
  shadow.rotation.x = -Math.PI / 2;
  shadow.position.set(0, -0.65, 0);
  g.add(shadow);

  // Floating particles
  const particleCount = 500;
  const particleGeo = new THREE.BufferGeometry();
  const basePos = new Float32Array(particleCount * 3);
  const pPos = new Float32Array(particleCount * 3);
  const pPhase = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    const r = 0.8 + Math.random() * 1.5;
    basePos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    basePos[i * 3 + 1] = r * Math.cos(phi) * 0.6;
    basePos[i * 3 + 2] = r * Math.sin(phi) * Math.sin(theta);
    pPos[i * 3] = basePos[i * 3];
    pPos[i * 3 + 1] = basePos[i * 3 + 1];
    pPos[i * 3 + 2] = basePos[i * 3 + 2];
    pPhase[i * 3] = Math.random() * Math.PI * 2;
    pPhase[i * 3 + 1] = Math.random() * Math.PI * 2;
    pPhase[i * 3 + 2] = Math.random() * Math.PI * 2;
  }
  particleGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  const particleMat = new THREE.PointsMaterial({
    color: 0x88bbff,
    size: 0.015,
    transparent: true,
    opacity: 0.3,
    blending: THREE.AdditiveBlending,
    depthWrite: false
  });
  const particles = new THREE.Points(particleGeo, particleMat);
  scene.add(particles);
  let pTime = 0;

  // ── Bubble gum ──
  const bubbleMat = new THREE.ShaderMaterial({
    uniforms: { uColor: { value: new THREE.Color(0xff69b4) } },
    vertexShader: `
      varying float vFresnel;
      void main() {
        vec4 wp = modelMatrix * vec4(position, 1.0);
        vec3 vd = normalize(cameraPosition - wp.xyz);
        vec3 n = normalize(normalMatrix * normal);
        vFresnel = 1.0 - abs(dot(n, vd));
        vFresnel = pow(vFresnel, 2.5);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform vec3 uColor;
      varying float vFresnel;
      void main() {
        vec3 inner = uColor * 0.2;
        vec3 rim = uColor * (0.8 + vFresnel * 0.6);
        gl_FragColor = vec4(mix(inner, rim, vFresnel), 0.08 + vFresnel * 0.55);
      }
    `,
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const bubble = new THREE.Mesh(new THREE.SphereGeometry(1, 28, 28), bubbleMat);
  bubble.position.set(0, -0.15, 0.60);
  bubble.visible = false;
  hg.add(bubble);

  const POP_N = 30;
  const popGeo = new THREE.BufferGeometry();
  const popPos = new Float32Array(POP_N * 3);
  const popVel = new Float32Array(POP_N * 3);
  popGeo.setAttribute('position', new THREE.BufferAttribute(popPos, 3));
  const popMat = new THREE.PointsMaterial({
    color: 0xff69b4, size: 0.04, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false,
  });
  const popPts = new THREE.Points(popGeo, popMat);
  popPts.position.set(0, -0.15, 0.60);
  popPts.visible = false;
  hg.add(popPts);

  const BUBBLE_IDLE = 0, BUBBLE_INFLATE = 1, BUBBLE_SUSTAIN = 2, BUBBLE_POP = 3, BUBBLE_COOLDOWN = 4;
  let bPhase = BUBBLE_COOLDOWN;
  let bTimer = 2;
  let bScale = 0.001;
  const BUBBLE_MAX = 0.2;
  const MAX_POP = 0.8;
  let popLife = MAX_POP;

  let audioCtx = null;
  function playPop() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sr = audioCtx.sampleRate;
    const len = sr * 0.08;
    const buf = audioCtx.createBuffer(1, len, sr);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      const t = i / sr;
      const env = Math.exp(-t * 60);
      ch[i] = (Math.random() * 2 - 1) * env * 0.3 + Math.sin(t * 800) * env * 0.2;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start();
  }

  let inflateOsc = null;
  let inflateGain = null;
  function startInflateSound() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (inflateOsc) return;
    inflateOsc = audioCtx.createOscillator();
    inflateGain = audioCtx.createGain();
    inflateOsc.type = 'sine';
    inflateOsc.frequency.setValueAtTime(200, audioCtx.currentTime);
    inflateGain.gain.setValueAtTime(0.12, audioCtx.currentTime);
    inflateOsc.connect(inflateGain);
    inflateGain.connect(audioCtx.destination);
    inflateOsc.start();
  }
  function updateInflateSound(progress) {
    if (inflateOsc) {
      const freq = 200 + progress * 1200;
      inflateOsc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    }
  }
  function stopInflateSound() {
    if (inflateOsc) { try { inflateOsc.stop(); } catch(e) {} inflateOsc = null; }
    if (inflateGain) { inflateGain.disconnect(); inflateGain = null; }
  }

  function triggerSneeze() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const sr = audioCtx.sampleRate;
    const len = sr * 0.35;
    const buf = audioCtx.createBuffer(1, len, sr);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      const t = i / sr;
      const env = Math.exp(-t * 8);
      ch[i] = (Math.random() * 2 - 1) * env * 0.5 + Math.sin(t * 300 + t * 2500) * env * 0.25;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    src.start();
    stopInflateSound();
    prevPopColor = popMat.color.getHex();
    popMat.color.setHex(0x88ccff);
    for (let i = 0; i < POP_N; i++) {
      popPos[i*3] = 0; popPos[i*3+1] = -0.02; popPos[i*3+2] = 0.62;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const s = 0.3 + Math.random() * 0.5;
      popVel[i*3] = Math.sin(phi) * Math.cos(theta) * s;
      popVel[i*3+1] = Math.sin(phi) * Math.sin(theta) * s;
      popVel[i*3+2] = Math.cos(phi) * s;
    }
    popGeo.attributes.position.needsUpdate = true;
    popLife = 0;
    popPts.visible = true;
    popMat.opacity = 1;
    setTimeout(() => { popMat.color.setHex(prevPopColor); }, 500);
  }

  function triggerPop() {
    stopInflateSound();
    playPop();
    for (let i = 0; i < POP_N; i++) {
      popPos[i*3] = 0; popPos[i*3+1] = 0; popPos[i*3+2] = 0;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const s = 0.15 + Math.random() * 0.35;
      popVel[i*3] = Math.sin(phi) * Math.cos(theta) * s;
      popVel[i*3+1] = Math.sin(phi) * Math.sin(theta) * s;
      popVel[i*3+2] = Math.cos(phi) * s;
    }
    popGeo.attributes.position.needsUpdate = true;
    popLife = 0;
    popPts.visible = true;
    popMat.opacity = 1;
  }

  let imuX = 0, imuY = 0, imuZ = 0;
  let gyroBiasX = 0, gyroBiasY = 0, gyroBiasZ = 0;
  let calibrating = false;
  let calibrationSamples = [];
  let lastTs = 0;

  function setOrientation(gx, gy, gz, ts) {
    if (calibrating) calibrationSamples.push({ gx, gy, gz });
    if (lastTs === 0) { lastTs = ts; return; }
    const dt = Math.min((ts - lastTs) / 1000, 0.05);
    lastTs = ts;
    const deg2rad = Math.PI / 180;
    imuX += (gx - gyroBiasX) * deg2rad * dt;
    imuY += (gz - gyroBiasZ) * deg2rad * dt;
    imuZ += (gy - gyroBiasY) * deg2rad * dt;
  }

  function startCalibration() {
    calibrating = true;
    calibrationSamples = [];
  }
  function stopCalibration() {
    calibrating = false;
    if (calibrationSamples.length > 3) {
      const n = calibrationSamples.length;
      let sx = 0, sy = 0, sz = 0;
      for (const s of calibrationSamples) { sx += s.gx; sy += s.gy; sz += s.gz; }
      if (n > 0) { gyroBiasX = sx / n; gyroBiasY = sy / n; gyroBiasZ = sz / n; }
    }
  }

  function resetOrientation() {

    const cAngle = -imuY;

    if (sbs) {
      const ipd = IPD / 2;
      cameraL.position.set(neckR * Math.sin(cAngle) - ipd * 0.5, cY, 2.0);
      cameraL.lookAt(cAngle * 0.3 - ipd * 0.15, 0.1, 0);
      cameraR.position.set(neckR * Math.sin(cAngle) + ipd * 0.5, cY, 2.0);
      cameraR.lookAt(cAngle * 0.3 + ipd * 0.15, 0.1, 0);

    blinkTimer -= dt;
    if (blinkTimer < 0) {
      const t = Math.min(-blinkTimer / 0.1, 1);
      const close = t < 0.5 ? t * 2 : 2 - t * 2;

    // ── Keyboard butterfly control ──

      bfTarget.y = Math.max(-0.5, Math.min(0.6, bfTarget.y + kdy * 0.016));

    bfPos.x += (bfTarget.x - bfPos.x) * 0.02;
    bfPos.y += (bfTarget.y - bfPos.y) * 0.02;

    bfGroup.position.set(bfPos.x, bfPos.y + Math.sin(bfPhase2 * 3) * 0.02, bfPos.z);
    bfGroup.rotation.y = Math.sin(bfPhase2 * 0.5) * 0.5;
    bfWings[0].rotation.y = 0.3 + Math.sin(bfPhase2 * 5) * 0.6;

    // ── Butterfly trail ──

    if (trailTimer > TRAIL_INTERVAL) {

    const tArr = trailGeo2.attributes.position.array;
    for (let i = 0; i < trailData.length; i++) {

      tArr[i*3+1] = trailData[i].y;

    trailGeo2.attributes.position.needsUpdate = true;

    // ── Eye tracking ──
    for (const eye of eyeData) {
      const dx = bfPos.x - eye.baseX;
      const dy = bfPos.y - 0.12;
      const dz = bfPos.z - 0.54;
      const maxOff = 0.03;
      const len = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;
      const offX = (dx / len) * maxOff;
      const offY = (dy / len) * maxOff;
      eye.iris.position.set(eye.baseX + offX, 0.13 + offY, 0.56);
      eye.pupil.position.set(eye.baseX + offX * 1.2, 0.13 + offY * 1.2, 0.58);
    }

    // ── Sneeze detection ──
    if (!isSneezing) {
      const sx = bfPos.x - 0;
      const sy = bfPos.y + 0.02;
      const sz = bfPos.z - 0.62;
      if (sx*sx + sy*sy + sz*sz < 0.005) {
        isSneezing = true;
        sneezeTimer = 0;
        triggerSneeze();
      }
    }

    // ── Mouth animation ──
    if (bPhase === BUBBLE_INFLATE || bPhase === BUBBLE_SUSTAIN) {
      if (!mouthBlow.visible) {
        mouth.visible = false;
        mouthBlow.visible = true;
        startInflateSound();
      }
      const progress = bPhase === BUBBLE_SUSTAIN ? 1 : 1 - bTimer / 1.8;
      mouthBlow.scale.set(1, 1, 1);
      mouthBlow.position.set(0, -0.15 - progress * 0.01, 0.58 + progress * 0.04);
      if (bPhase === BUBBLE_INFLATE) updateInflateSound(progress);
    } else {
      if (mouthBlow.visible) {
        mouthBlow.visible = false;
        mouth.visible = true;
        stopInflateSound();
      }
    }

    // ── Particles ──
    const amp = 0.04;
    const pos = particles.geometry.attributes.position.array;
    for (let i = 0; i < particleCount; i++) {
      pos[i * 3] = basePos[i * 3] + Math.sin(pTime * 1.1 + pPhase[i * 3]) * amp;
      pos[i * 3 + 1] = basePos[i * 3 + 1] + Math.sin(pTime * 0.9 + pPhase[i * 3 + 1]) * amp;
      pos[i * 3 + 2] = basePos[i * 3 + 2] + Math.sin(pTime * 1.3 + pPhase[i * 3 + 2]) * amp;
    }
    particles.geometry.attributes.position.needsUpdate = true;

    // ── Bubble gum state machine ──
    if (bPhase === BUBBLE_IDLE) {
      if (keys[' '] || keys['Space']) {
        bPhase = BUBBLE_INFLATE;
        bTimer = 1.8;
        bScale = 0.001;
        bubble.visible = true;
        bubble.scale.set(bScale, bScale, bScale);
      }
    } else if (bPhase === BUBBLE_INFLATE) {
      if (!(keys[' '] || keys['Space'])) {
        bPhase = BUBBLE_POP;
        bubble.visible = false;
        triggerPop();
      } else {
        bTimer -= dt;
        bScale = 0.001 + (1 - bTimer / 1.8) * BUBBLE_MAX;
        bubble.scale.set(bScale, bScale, bScale);
        if (bTimer <= 0) {
          bPhase = BUBBLE_SUSTAIN;
          bTimer = 0.5;
        }
      }
    } else if (bPhase === BUBBLE_SUSTAIN) {
      bTimer -= dt;
      if (bTimer <= 0) {
        bPhase = BUBBLE_POP;
        bubble.visible = false;
        triggerPop();
      }
    } else if (bPhase === BUBBLE_POP) {
      popLife += dt;
      if (popLife < MAX_POP) {
        const progress = popLife / MAX_POP;
        for (let i = 0; i < POP_N; i++) {
          popPos[i*3] += popVel[i*3] * dt;
          popPos[i*3+1] += popVel[i*3+1] * dt;
          popPos[i*3+2] += popVel[i*3+2] * dt;
          popVel[i*3] *= 0.97;
        }
        popGeo.attributes.position.needsUpdate = true;
        popMat.opacity = 1 - progress;
      } else {
        popPts.visible = false;
        bPhase = BUBBLE_COOLDOWN;
        bTimer = 3;
      }
    } else if (bPhase === BUBBLE_COOLDOWN) {
      bTimer -= dt;
      if (bTimer <= 0) {
        bPhase = BUBBLE_IDLE;
        bTimer = 2 + Math.random() * 2;
      }
    }

    if (sbs) {
      const w = container.clientWidth;
      const h = container.clientHeight;
      const leftCam = crossview ? cameraR : cameraL;
      const rightCam = crossview ? cameraL : cameraR;
      renderer.setViewport(0, 0, Math.floor(w / 2), h);
      renderer.setScissor(0, 0, Math.floor(w / 2), h);
      renderer.setScissorTest(true);
      renderer.render(scene, leftCam);

      renderer.setViewport(Math.ceil(w / 2), 0, Math.floor(w / 2), h);
      renderer.setScissor(Math.ceil(w / 2), 0, Math.floor(w / 2), h);
      renderer.render(scene, rightCam);

      renderer.setScissorTest(false);
    } else {
      renderer.setViewport(0, 0, container.clientWidth, container.clientHeight);
      renderer.render(scene, camera);
    }
  }
  animate();

  window.__imu3d = { setOrientation, resetOrientation, resize, setSmile, toggleSbs, toggleCrossview, calibrate: on => on ? startCalibration() : stopCalibration() };
}

try {
  initScene();
} catch (e) {
  console.error('[3D] init failed:', e);
}

<script>
(function() {
  'use strict';

  const AIR_VID = 0x3318;
  const MAX_HISTORY = 500;

  let hidDevices = [];
  let imuHistory = [];
  let connected = false;
  let imuEnabled = false;
  let connectInProgress = false;

  const connectBtn = document.getElementById('connect-btn');
  const recenterBtn = document.getElementById('recenter-btn');
  const calibrateBtn = document.getElementById('calibrate-btn');
  const statusText = document.getElementById('status-text');
  const statusDot = document.getElementById('status-dot');
  const gyroCanvas = document.getElementById('gyro-canvas');
  const gyroCtx = gyroCanvas.getContext('2d');
  const gyroValues = document.getElementById('gyro-values');
  const graphToggle = document.getElementById('graph-toggle');
  const graphBody = document.getElementById('graph-body');
  const graphOverlay = document.getElementById('graph-overlay');

  function setStatus(text, cls) {
    statusText.innerHTML = '<span class="status-dot ' + cls + '" id="status-dot"></span>' + text;
    if (cls === 'connected') {
      connectBtn.textContent = 'Disconnect';
      connectBtn.disabled = false;
    } else if (cls === 'connecting') {
      connectBtn.textContent = 'Connecting...';
      connectBtn.disabled = true;
    } else {
      connectBtn.textContent = 'Connect';
      connectBtn.disabled = false;
    }
    recenterBtn.disabled = cls !== 'connected' || !imuEnabled;
    calibrateBtn.disabled = cls !== 'connected' || !imuEnabled;
    const sbsBtn = document.getElementById('sbs-btn');
    if (sbsBtn) sbsBtn.style.display = cls === 'connected' ? '' : 'none';
  }

  function log(msg) {
    console.log('[Demo]', msg);
  }

  function warn(msg) {
    console.warn('[Demo]', msg);
  }

  // ── CRC32 ──
  const crc32Table = new Uint32Array(256);
  for (let i = 0; i < 256; i++) {
    let crc = i;
    for (let j = 0; j < 8; j++) crc = (crc & 1) ? (0xEDB88320 ^ (crc >>> 1)) : (crc >>> 1);
    crc32Table[i] = crc;
  }
  function crc32(data) {
    let crc = 0xFFFFFFFF;
    for (let i = 0; i < data.length; i++) crc = crc32Table[(crc ^ data[i]) & 0xFF] ^ (crc >>> 8);
    return crc ^ 0xFFFFFFFF;
  }

  function buildImuCommand(cmdId, data) {
    const buf = new Uint8Array(0x40);
    const payload = new Uint8Array([cmdId, ...data]);
    const length = data.length + 3;
    buf[0] = 0xAA;
    buf[5] = length & 0xFF;
    buf[6] = (length >> 8) & 0xFF;
    buf[7] = cmdId;
    buf.set(data, 8);
    const chk = crc32(buf.slice(5, 5 + length));
    buf[1] = chk & 0xFF;
    buf[2] = (chk >> 8) & 0xFF;
    buf[3] = (chk >> 16) & 0xFF;
    buf[4] = (chk >> 24) & 0xFF;
    return buf;
  }

  function readInt16(data, offset) {
    if (offset + 2 > data.length) return 0;
    return data[offset] | (data[offset + 1] << 8);
  }
  function readInt24(data, offset) {
    if (offset + 3 > data.length) return 0;
    let val = data[offset] | (data[offset + 1] << 8) | (data[offset + 2] << 16);
    if (val & 0x800000) val -= 0x1000000;
    return val;
  }
  function readInt32(data, offset) {
    if (offset + 4 > data.length) return 0;
    return data[offset] | (data[offset + 1] << 8) | (data[offset + 2] << 16) | (data[offset + 3] << 24);
  }

  function isImuPacket(data) {
    return data.length >= 4 && data[0] === 0x01 && data[1] === 0x02;
  }

  function parseImuData(data) {
    if (!isImuPacket(data)) return null;
    const rawGx = readInt24(data, 0x12);
    const rawGy = readInt24(data, 0x15);
    const rawGz = readInt24(data, 0x18);
    const gMult = readInt16(data, 0x0C);
    const gDiv = readInt32(data, 0x0E);
    const gx = gDiv !== 0 ? (rawGx * gMult) / gDiv : 0;
    const gy = gDiv !== 0 ? (rawGy * gMult) / gDiv : 0;
    const gz = gDiv !== 0 ? (rawGz * gMult) / gDiv : 0;
    const rawAx = readInt24(data, 0x21);
    const rawAy = readInt24(data, 0x24);
    const rawAz = readInt24(data, 0x27);
    const aMult = readInt16(data, 0x1B);
    const aDiv = readInt32(data, 0x1D);
    const ax = aDiv !== 0 ? (rawAx * aMult) / aDiv : 0;
    const ay = aDiv !== 0 ? (rawAy * aMult) / aDiv : 0;
    const az = aDiv !== 0 ? (rawAz * aMult) / aDiv : 0;
    const rawMx = readInt16(data, 0x30);
    const rawMy = readInt16(data, 0x32);
    const rawMz = readInt16(data, 0x34);
    const mOff = readInt16(data, 0x2A);
    const mDiv = readInt32(data, 0x2C);
    const mx = mDiv !== 0 ? (rawMx - mOff) / mDiv : 0;
    const my = mDiv !== 0 ? (rawMy - mOff) / mDiv : 0;
    const mz = mDiv !== 0 ? (rawMz - mOff) / mDiv : 0;
    const temp = readInt16(data, 0x02);
    const tempC = temp !== 0 ? temp / 326.8 + 25.0 : 0;
    return { gx, gy, gz, ax, ay, az, mx, my, mz, temp: tempC };
  }

  function readFloat32(data, offset) {
    if (offset + 4 > data.length) return 0;
    return new DataView(data.buffer, data.byteOffset + offset, 4).getFloat32(0, true);
  }

  let hidDumpCount = 0;
  let prevHid = null;
  function handleImuData(bytes) {
    if (bytes[0] !== 0x01 && bytes.length >= 8) {
      if (hidDumpCount < 2) {
        hidDumpCount++;
        log('HID packet hex: ' + Array.from(bytes.slice(0, 16)).map(b => b.toString(16).padStart(2, '0')).join(' ') + '...');
      }
      if (hidDumpCount < 4 && prevHid) {
        const changed = [];
        for (let i = 0; i < 64; i++) if (bytes[i] !== prevHid[i]) changed.push(i + ':' + bytes[i].toString(16).padStart(2, '0'));
        log('HID changed bytes: ' + changed.join(' '));
      }
      if (hidDumpCount < 10) {
        hidDumpCount++;
        const raw = (bytes[8] | (bytes[9]<<8) | (bytes[10]<<16) | (bytes[11]<<24)) >>> 0;
        log('HID raw u32@8=' + raw + ' seq=' + bytes[0]);
      }
      prevHid = new Uint8Array(bytes);
      return;
    }
    let imu = parseImuData(bytes);
    if (!imu) return;
    imuHistory.push(imu);
    if (imuHistory.length > MAX_HISTORY) imuHistory.shift();
    if (window.__imu3d) window.__imu3d.setOrientation(imu.gx, imu.gy, imu.gz, performance.now());
    drawGyroGraph(imu);
  }

  // ── Gyro graph ──
  function drawGyroGraph(imu) {
    const rect = gyroCanvas.parentElement.getBoundingClientRect();
    const w = gyroCanvas.width = rect.width - 8;
    const h = gyroCanvas.height = 100;
    const ctx = gyroCtx;
    if (w <= 0) return;

    const data = imuHistory;
    if (data.length < 2) return;

    let maxAbs = 1;
    for (let i = 0; i < data.length; i++) {
      maxAbs = Math.max(maxAbs, Math.abs(data[i].gx), Math.abs(data[i].gy), Math.abs(data[i].gz));
    }
    const scale = (h * 0.45) / maxAbs;
    const midY = h / 2;
    const step = w / Math.min(data.length, 200);
    const use = data.slice(-Math.floor(w / step));

    function drawTrace(key, color) {
      if (use.length < 2) return;
      ctx.beginPath();
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.5;
      for (let i = 0; i < use.length; i++) {
        const x = i * step;
        const y = midY - use[i][key] * scale;
        i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#0d1117';
    ctx.fillRect(0, 0, w, h);

    // center line
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, midY);
    ctx.lineTo(w, midY);
    ctx.stroke();

    drawTrace('gx', '#ff6b6b');
    drawTrace('gy', '#51cf66');
    drawTrace('gz', '#339af0');

    gyroValues.textContent = 'X:' + imu.gx.toFixed(0) + ' Y:' + imu.gy.toFixed(0) + ' Z:' + imu.gz.toFixed(0);
  }

  async function sendToAllHid(devices, buf) {
    let sent = 0;
    for (const hd of devices) {
      for (const col of (hd.collections || [])) {
        for (const r of (col.outputReports || [])) {
          try { await hd.sendReport(r.reportId, buf); sent++; } catch (e) {}
        }
        for (const r of (col.featureReports || [])) {
          try { await hd.sendFeatureReport(r.reportId, buf); sent++; } catch (e) {}
        }
      }
    }
    return sent;
  }

  async function sendImuEnable(enable) {
    const buf = buildImuCommand(0x19, [enable ? 0x01 : 0x00]);
    const label = enable ? 'Enable' : 'Disable';
    const n = await sendToAllHid(hidDevices, buf);
    if (n > 0) { log('IMU ' + label + ' sent to ' + n + ' HID reports'); return true; }
    warn('IMU ' + label + ' failed: no HID reports accepted');
    return false;
  }

  function buildMcuCommand(cmdId, data) {
    const buf = new Uint8Array(0x40);
    const length = data.length + 17;
    buf[0] = 0xFD;
    buf[5] = length & 0xFF;
    buf[6] = (length >> 8) & 0xFF;
    buf[7] = 0x37; buf[8] = 0x13; // request_id = 0x1337
    buf[15] = cmdId & 0xFF;
    buf[16] = (cmdId >> 8) & 0xFF;
    buf.set(data, 22);
    const chk = crc32(buf.slice(5, 5 + length));
    buf[1] = chk & 0xFF;
    buf[2] = (chk >> 8) & 0xFF;
    buf[3] = (chk >> 16) & 0xFF;
    buf[4] = (chk >> 24) & 0xFF;
    return buf;
  }
  async function sendMcuCommand(cmdId, data) {
    const buf = buildMcuCommand(cmdId, data);
    const n = await sendToAllHid(hidDevices, buf);
    return n > 0;
  }

  async function connect() {
    if (connectInProgress) return;
    connectInProgress = true;
    setStatus('Connecting...', 'connecting');

    try {
      if (!navigator.hid) {
        warn('WebHID not available');
        setStatus('No HID', 'disconnected');
        connectInProgress = false;
        return;
      }

      const devs = await navigator.hid.requestDevice({ filters: [{ vendorId: AIR_VID }] });
      for (const d of devs) {
        await d.open();
        hidDevices.push(d);
        log('HID device opened: productId=0x' + d.productId.toString(16) + ' productName=' + d.productName);
        d.addEventListener('inputreport', (event) => {
          handleImuData(new Uint8Array(event.data.buffer));
        });
      }

      if (hidDevices.length === 0) {
        warn('No HID device found');
        setStatus('No device', 'disconnected');
        connectInProgress = false;
        return;
      }

      setStatus('Enabling IMU...', 'connecting');

      // Disable first, then enable (matching Rust driver sequence)
      await sendImuEnable(false);
      await new Promise(r => setTimeout(r, 50));
      imuEnabled = await sendImuEnable(true);

      connected = true;
      setStatus('Connected', 'connected');
      if (window.__imu3d) window.__imu3d.setSmile(true);
    } catch (err) {
      warn('Connection error: ' + err.message);
      setStatus('Error', 'disconnected');
    }

    connectInProgress = false;
  }

  async function disconnect() {
    imuEnabled = false;
    connected = false;

    while (hidDevices.length > 0) {
      const d = hidDevices.pop();
      try { await d.close(); } catch(e) {}
    }

    const sbsBtn = document.getElementById('sbs-btn');
    if (sbsBtn && sbsBtn.textContent === 'Mono' && window.__imu3d && window.__imu3d.toggleSbs) {
      window.__imu3d.toggleSbs();
      sbsBtn.textContent = 'SBS 3D';
    }
    const cvBtn = document.getElementById('crossview-btn');
    if (cvBtn) cvBtn.style.display = 'none';
    imuHistory.length = 0;
    if (window.__imu3d) window.__imu3d.resetOrientation();
    if (window.__imu3d) window.__imu3d.setSmile(false);
    log('Disconnected');
    setStatus('Disconnected', 'disconnected');
  }

  function startCalibration() {
    if (!window.__imu3d) return;
    calibrateBtn.disabled = true;
    calibrateBtn.textContent = 'Calibrating...';
    window.__imu3d.calibrate(true);
    setTimeout(() => {
      window.__imu3d.calibrate(false);
      calibrateBtn.textContent = 'Calibrate';
      calibrateBtn.disabled = false;
    }, 2000);
  }

  calibrateBtn.addEventListener('click', startCalibration);

  // ── UI event handlers ──
  connectBtn.addEventListener('click', () => {
    if (connected) {
      disconnect();
    } else {
      connect();
    }
  });

  recenterBtn.addEventListener('click', () => {
    if (window.__imu3d) window.__imu3d.resetOrientation();
  });

  document.getElementById('sbs-btn').addEventListener('click', () => {
    if (window.__imu3d && window.__imu3d.toggleSbs) {
      const enabled = window.__imu3d.toggleSbs();
      document.getElementById('sbs-btn').textContent = enabled ? 'Mono' : 'SBS 3D';
      const cvBtn = document.getElementById('crossview-btn');
      if (enabled) {
        cvBtn.style.display = '';
        cvBtn.textContent = 'Crossview';
      } else {
        cvBtn.style.display = 'none';
      }
      sendMcuCommand(0x0008, [enabled ? 1 : 0]);
    }
  });

  document.getElementById('crossview-btn').addEventListener('click', () => {
    if (window.__imu3d && window.__imu3d.toggleCrossview) {
      const cv = window.__imu3d.toggleCrossview();
      document.getElementById('crossview-btn').textContent = cv ? 'Parallel' : 'Crossview';
    }
  });

  graphToggle.addEventListener('click', () => {
    const hidden = graphBody.style.display === 'none';
    graphBody.style.display = hidden ? '' : 'none';
    graphToggle.textContent = hidden ? 'Hide' : 'Show';
  });

  // Gyro graph resize
  function resizeGraph() {
    const rect = gyroCanvas.parentElement.getBoundingClientRect();
    gyroCanvas.width = rect.width - 8;
    gyroCanvas.height = 100;
  }
  window.addEventListener('resize', resizeGraph);

  // Show connected state if user clicks Connect again while connected, disconnect
  // (handled above in click handler)

  // Auto-reconnect if we already have permission
  async function tryAutoConnect() {
    if (!navigator.hid) return;
    try {
      const devs = await navigator.hid.getDevices();
      for (const d of devs) {
        await d.open();
        hidDevices.push(d);
        log('Auto-connected HID: productId=0x' + d.productId.toString(16));
        d.addEventListener('inputreport', (event) => {
          handleImuData(new Uint8Array(event.data.buffer));
        });
      }
      if (hidDevices.length === 0) return;
      setStatus('Enabling IMU...', 'connecting');
      await sendImuEnable(false);
      await new Promise(r => setTimeout(r, 50));
      imuEnabled = await sendImuEnable(true);
      connected = true;
      setStatus('Connected', 'connected');
      if (window.__imu3d) window.__imu3d.setSmile(true);
    } catch (err) { warn('Auto-connect:', err.message); }
  }

  tryAutoConnect();

  setStatus('Disconnected', 'disconnected');
  resizeGraph();

  log('Demo initialized. Click Connect to start.');
})();
</script>
</body>
</html>
